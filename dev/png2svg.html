<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mokuri Element Forge - Test Bench</title>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 2rem; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .box { flex: 1; min-width: 300px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        img, svg { max-width: 100%; height: auto; background: #00FF00; border: 1px solid #444; }
        pre { background: #000; padding: 10px; overflow-x: auto; font-size: 12px; color: #0f0; }
        button { padding: 10px 20px; cursor: pointer; background: #d4622b; border: none; color: white; font-weight: bold; }
        .controls { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; align-items: center; background: #2a2a2a; padding: 12px 16px; border-radius: 8px; }
        .ctrl { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .ctrl label { min-width: 60px; color: #aaa; }
        .ctrl input[type=range] { width: 120px; }
        .ctrl span { min-width: 32px; font-weight: bold; color: #e0e0e0; }
    </style>
</head>
<body>

    <h1>Mokuri Element Forge: PNG → SVG</h1>
    <p>Upload a 4-zone PNG with #00FF00 background to test the vectorization quality.</p>

    <input type="file" id="upload" accept="image/png" style="margin-bottom: 16px; display:block;">

    <div class="controls">
        <div class="ctrl">
            <label title="Line simplification threshold. Higher = fewer segments on straight edges.">Line (ltres)</label>
            <input type="range" id="ctrl-ltres" min="0" max="50" step="1" value="10">
            <span id="val-ltres">1.0</span>
        </div>
        <div class="ctrl">
            <label title="Curve simplification threshold. Higher = fewer segments on curves.">Curve (qtres)</label>
            <input type="range" id="ctrl-qtres" min="0" max="50" step="1" value="10">
            <span id="val-qtres">1.0</span>
        </div>
        <div class="ctrl">
            <label title="Ignore paths smaller than this many pixels.">Path min</label>
            <input type="range" id="ctrl-pathomit" min="0" max="20" step="1" value="0">
            <span id="val-pathomit">0</span>
        </div>
        <div class="ctrl" style="margin-left:auto;">
            <span id="path-count" style="color:#888; font-size:12px;"></span>
        </div>
    </div>

    <div class="container">
        <div class="box">
            <h3>1. Source PNG</h3>
            <img id="source-img" src="" alt="Waiting for upload...">
        </div>

        <div class="box">
            <h3>2. Processed SVG (Shape Level)</h3>
            <div id="svg-container"></div>
            <button id="download-btn" style="display:none; margin-top:10px;">Download SVG</button>
        </div>
    </div>

    <div class="box" style="margin-top: 20px;">
        <h3>3. Path Data (for JS Element Definition)</h3>
        <pre id="path-output">Path data will appear here...</pre>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const sourceImg = document.getElementById('source-img');
        const svgContainer = document.getElementById('svg-container');
        const pathOutput = document.getElementById('path-output');
        let _lastSvgStr = null;
        let _lastImgEl = null;

        // Slider display + re-trace on change
        function sliderVal(id, valId, scale) {
            const el = document.getElementById(id);
            const disp = document.getElementById(valId);
            function update() { disp.textContent = (parseInt(el.value) * scale).toFixed(scale < 1 ? 1 : 0); }
            el.addEventListener('input', () => { update(); if (_lastImgEl) processImage(_lastImgEl); });
            update();
        }
        sliderVal('ctrl-ltres', 'val-ltres', 0.1);
        sliderVal('ctrl-qtres', 'val-qtres', 0.1);
        sliderVal('ctrl-pathomit', 'val-pathomit', 1);

        upload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                sourceImg.src = event.target.result;
                sourceImg.onload = function() {
                    _lastImgEl = sourceImg;
                    processImage(sourceImg);
                };
            };
            reader.readAsDataURL(file);
        });

        function processImage(imgElement) {
            const ltres   = parseInt(document.getElementById('ctrl-ltres').value) * 0.1;
            const qtres   = parseInt(document.getElementById('ctrl-qtres').value) * 0.1;
            const pathomit = parseInt(document.getElementById('ctrl-pathomit').value);

            const options = {
                ltres,
                qtres,
                pathomit,
                colorsampling: 0,
                numberofcolors: 5,
                mincolorratio: 0,
                pal: [
                    {r:240, g:232, b:208, a:255},
                    {r:212, g:98, b:43, a:255},
                    {r:138, g:138, b:138, a:255},
                    {r:58, g:42, b:26, a:255},
                    {r:0, g:255, b:0, a:255}
                ],
                viewbox: true,
                linefilter: false
            };

            ImageTracer.imageToSVG(imgElement.src, function(svgstr) {
                _lastSvgStr = svgstr;
                svgContainer.innerHTML = svgstr;
                pathOutput.textContent = svgstr;
                document.getElementById('download-btn').style.display = 'block';
                // Count total path commands as a complexity indicator
                const cmds = (svgstr.match(/[MLCQZmlcqz]/g) || []).length;
                document.getElementById('path-count').textContent = cmds + ' path commands';
            }, options);
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            if (!_lastSvgStr) return;
            const blob = new Blob([_lastSvgStr], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'traced.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
